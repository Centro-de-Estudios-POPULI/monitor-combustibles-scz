name: Scrape saldos (cada 30 min)

on:
  schedule:
    # GitHub coalesce/retrasa crons; minutos desfasados (no en :00) para mejorar fiabilidad.
    # OJO: el scheduler de GitHub es poco fiable; el disparo real lo hace un pinger externo
    # (cron-job.org -> API workflow_dispatch). Este cron queda como respaldo.
    - cron: "7,37 * * * *"   # ~cada 30 min (UTC)
  workflow_dispatch:        # permite ejecutarlo a mano (y lo usa el pinger externo)

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar scraper
        run: python scraper/scrape.py

      - name: Commit de datos
        run: |
          git config user.name  "populi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "datos: snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
